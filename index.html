<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧮 MathStar — Matematika O'yini</title>
  <style>
    /* ASOSIY DIZAYN */
    body { font-family: 'Nunito', sans-serif; background: #F0F2F5; margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; }
    .screen { display: none; width: 100%; max-width: 500px; background: #fff; position: relative; overflow-y: auto; }
    .active { display: flex; flex-direction: column; }
    
    /* LOGIN EKRANI */
    #login { align-items: center; justify-content: center; background: #7C9EFF; }
    .login-box { background: white; padding: 30px; border-radius: 24px; text-align: center; width: 85%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .login-input { width: 90%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; margin: 15px 0; font-size: 18px; outline: none; }
    
    /* TUGMALAR */
    .btn { padding: 15px 30px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
    .btn-primary { background: #FFD166; color: #333; width: 100%; }
    
    /* STATISTIKA */
    .stats-bar { display: flex; justify-content: space-around; padding: 20px; background: #f8f9fa; border-radius: 20px; margin: 10px; }
    .stat-chip { text-align: center; }
    .val { font-size: 20px; font-weight: bold; }
    
    /* SAVOL EKRANI */
    #quiz-header { padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
    #question-text { font-size: 48px; text-align: center; margin: 40px 0; color: #333; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
    .opt-btn { background: #EEF0F8; padding: 20px; border-radius: 15px; font-size: 24px; border: 2px solid #ddd; }
  </style>
</head>
<body>

<div id="login" class="screen active">
  <div class="login-box">
    <span style="font-size: 60px;">👋</span>
    <h2>Salom! Isming nima?</h2>
    <input type="text" id="user-name-input" class="login-input" placeholder="Ismingizni yozing...">
    <button class="btn btn-primary" onclick="loginUser()">O'yinga kirish</button>
  </div>
</div>

<div id="home" class="screen">
  <div style="padding: 20px; text-align: center;">
    <h2 id="welcome-user">MathStar</h2>
    <div class="stats-bar">
      <div class="stat-chip"><div class="val" id="home-stars">0⭐</div><div>Yulduz</div></div>
      <div class="stat-chip"><div class="val" id="home-streak">0🔥</div><div>Streak</div></div>
    </div>
    <div id="levels-list" style="margin-top: 20px;">
       <button class="btn btn-primary" style="margin-bottom:10px;" onclick="startLevel(1)">1-Daraja (Boshlang'ich)</button>
       <button class="btn btn-primary" style="margin-bottom:10px; background:#7C9EFF;" onclick="startLevel(2)">2-Daraja (O'rta)</button>
    </div>
  </div>
</div>

<div id="quiz" class="screen">
  <div id="quiz-header">Savol: <span id="q-count">1</span>/20</div>
  <div id="question-text">5 + 2 = ?</div>
  <div class="options-grid" id="options"></div>
</div>

<script>
let currentUser = "";
let appData = { stars: 0, streak: 0 };
let currentQ = 0;
let correctCount = 0;
let correctAnswer = 0;

function loginUser() {
  const name = document.getElementById('user-name-input').value;
  if(name.length < 2) return alert("Ism kiriting");
  currentUser = name;
  document.getElementById('welcome-user').innerText = "Salom, " + name + "!";
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startLevel(lvl) {
  currentQ = 1;
  correctCount = 0;
  showScreen('quiz');
  nextQuestion();
}

function nextQuestion() {
  if(currentQ > 20) {
    alert("O'yin tugadi! To'g'ri javoblar: " + correctCount);
    appData.stars += correctCount;
    document.getElementById('home-stars').innerText = appData.stars + "⭐";
    showScreen('home');
    return;
  }
  document.getElementById('q-count').innerText = currentQ;
  let a = Math.floor(Math.random() * 10);
  let b = Math.floor(Math.random() * 10);
  correctAnswer = a + b;
  document.getElementById('question-text').innerText = `${a} + ${b} = ?`;
  
  let opts = [correctAnswer, correctAnswer+1, correctAnswer-1, correctAnswer+2];
  opts.sort(() => Math.random() - 0.5);
  
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  opts.forEach(o => {
    let btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerText = o;
    btn.onclick = () => checkAns(o);
    optDiv.appendChild(btn);
  });
}

function checkAns(val) {
  if(val === correctAnswer) correctCount++;
  currentQ++;
  nextQuestion();
}
</script>
</body>
</html>

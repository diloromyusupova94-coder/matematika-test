<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧮 MathStar — Matematika O'yini</title>
  <meta name="description" content="Bolalar uchun matematika testlari — qiziqarli va offline ishlaydigan" />
  <meta name="theme-color" content="#7C9EFF" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #F0F4FF;
      --card: #FFFFFF;
      --primary: #7C9EFF;
      --primary-dark: #5B7EFF;
      --green: #6ECFA0;
      --green-dark: #4BB882;
      --red: #FF8A80;
      --yellow: #FFD166;
      --orange: #FFB347;
      --purple: #C4A8FF;
      --pink: #FFB3D1;
      --text: #2D3561;
      --text-light: #7B88B5;
      --shadow: 0 4px 20px rgba(124,158,255,0.15);
      --shadow-lg: 0 8px 40px rgba(124,158,255,0.25);
      --radius: 20px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(196,168,255,0.2) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(110,207,160,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: flex; flex-direction: column; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== HOME SCREEN ===== */
    #home {
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      gap: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-emoji {
      font-size: 72px;
      display: block;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .logo-title {
      font-family: 'Baloo 2', cursive;
      font-size: 36px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -1px;
    }
    .logo-sub {
      font-size: 15px;
      color: var(--text-light);
      font-weight: 600;
      margin-top: 4px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    .stat-chip {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-chip .val {
      font-size: 22px;
      font-weight: 900;
      color: var(--primary-dark);
    }
    .stat-chip .lbl {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Levels grid */
    .levels-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      align-self: flex-start;
      max-width: 480px;
      width: 100%;
    }

    .levels-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    .level-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2.5px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .level-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 5px; height: 100%;
      background: var(--lvl-color, var(--primary));
      border-radius: 3px 0 0 3px;
    }
    .level-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .level-card.locked { opacity: 0.5; cursor: not-allowed; }

    .level-icon {
      font-size: 36px;
      flex-shrink: 0;
    }
    .level-info { flex: 1; }
    .level-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .level-desc {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      margin-top: 2px;
    }
    .level-progress {
      text-align: right;
      flex-shrink: 0;
    }
    .level-progress .steps {
      font-size: 18px;
      font-weight: 900;
      color: var(--lvl-color, var(--primary));
    }
    .level-progress .stlbl {
      font-size: 10px;
      color: var(--text-light);
      font-weight: 600;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: #EEF0F8;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--lvl-color, var(--primary));
      transition: width 0.5s ease;
    }

    /* ===== STEPS SCREEN ===== */
    #steps {
      gap: 20px;
    }
    .back-btn {
      background: var(--card);
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--text); transform: translateX(-2px); }

    .steps-header {
      text-align: center;
    }
    .steps-header .sh-icon { font-size: 48px; }
    .steps-header h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-top: 4px;
    }
    .steps-header p {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 600;
      margin-top: 2px;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 520px;
      align-self: center;
    }

    .step-btn {
      aspect-ratio: 1;
      border-radius: 12px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
    }
    .step-btn .snum { font-size: 15px; line-height: 1; }
    .step-btn .sstar { font-size: 10px; line-height: 1; }

    .step-btn.done {
      background: var(--lvl-color, var(--green));
      color: white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }
    .step-btn.done:hover { transform: scale(1.05); }
    .step-btn.current {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 16px rgba(124,158,255,0.5);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 16px rgba(124,158,255,0.5); }
      50% { box-shadow: 0 4px 24px rgba(124,158,255,0.8); }
    }
    .step-btn.locked {
      background: #EEF0F8;
      color: #C0C8E0;
      cursor: not-allowed;
    }

    /* ===== QUIZ SCREEN ===== */
    #quiz {
      gap: 16px;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }

    .quiz-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .quiz-info {
      flex: 1;
    }
    .quiz-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .quiz-progress-bar {
      width: 100%;
      height: 8px;
      background: #EEF0F8;
      border-radius: 4px;
      margin-top: 4px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--primary), var(--purple));
      transition: width 0.4s ease;
    }

    .streak-badge {
      background: linear-gradient(135deg, #FFD166, #FF9F43);
      color: white;
      border-radius: 50px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 56px;
      justify-content: center;
    }

    .timer-badge {
      background: var(--card);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      box-shadow: var(--shadow);
      min-width: 56px;
      text-align: center;
    }
    .timer-badge.warning { color: var(--red); animation: shake 0.3s; }

    /* Question card */
    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }
    .question-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--purple), var(--pink));
    }

    .q-num {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .question-text {
      font-family: 'Baloo 2', cursive;
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
    }

    .question-emoji {
      font-size: 28px;
      margin-top: 8px;
      display: block;
    }

    /* Options */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      background: var(--card);
      border: 2.5px solid #E8ECF8;
      border-radius: var(--radius-sm);
      padding: 18px 12px;
      font-family: 'Baloo 2', cursive;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .option-btn:active:not(:disabled) { transform: scale(0.97); }

    .option-btn.correct {
      background: var(--green);
      border-color: var(--green-dark);
      color: white;
      animation: correctPop 0.4s ease;
    }
    .option-btn.wrong {
      background: var(--red);
      border-color: #FF5252;
      color: white;
      animation: wrongShake 0.4s ease;
    }
    .option-btn.reveal {
      background: rgba(110,207,160,0.1);
      border-color: var(--green);
      color: var(--green-dark);
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ===== RESULT SCREEN ===== */
    #result {
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
    }
    .result-emoji {
      font-size: 80px;
      display: block;
      animation: resultBounce 0.6s ease;
    }
    @keyframes resultBounce {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-title {
      font-family: 'Baloo 2', cursive;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-top: 12px;
    }
    .result-score {
      font-size: 48px;
      font-weight: 900;
      margin: 16px 0 4px;
    }
    .result-score.pass { color: var(--green-dark); }
    .result-score.fail { color: var(--red); }
    .result-sub {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 600;
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    .rs-chip {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
    }
    .rs-chip .rv { font-size: 20px; font-weight: 900; color: var(--text); }
    .rs-chip .rl { font-size: 10px; color: var(--text-light); font-weight: 700; text-transform: uppercase; }

    .result-mistakes {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .result-mistakes h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mistake-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #EEF0F8;
      font-size: 14px;
    }
    .mistake-item:last-child { border-bottom: none; }
    .mistake-item .mq { font-weight: 700; color: var(--text); }
    .mistake-item .mw { color: var(--red); font-weight: 700; }
    .mistake-item .mc { color: var(--green-dark); font-weight: 700; }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 50px;
      padding: 16px 32px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 20px rgba(124,158,255,0.4);
    }
    .btn-green {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      box-shadow: 0 4px 20px rgba(110,207,160,0.4);
    }
    .btn-outline {
      background: var(--card);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    /* ===== STATS SCREEN ===== */
    #stats {
      gap: 20px;
    }
    .stats-header {
      text-align: center;
    }
    .stats-header h2 {
      font-family: 'Baloo 2', cursive;
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .stats-overview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      align-self: center;
    }
    .so-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .so-card .sov { font-size: 32px; font-weight: 900; color: var(--primary-dark); }
    .so-card .sol { font-size: 12px; color: var(--text-light); font-weight: 700; margin-top: 4px; }

    .medals-section {
      width: 100%; max-width: 480px; align-self: center;
    }
    .medals-section h3 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
    .medals-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .medal-item {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 12px 6px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .medal-item .mi { font-size: 28px; }
    .medal-item .ml { font-size: 10px; color: var(--text-light); font-weight: 700; margin-top: 4px; }
    .medal-item.locked-medal { opacity: 0.3; filter: grayscale(1); }

    /* Nav bar */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      display: flex;
      padding: 12px 0 20px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px;
      transition: all 0.2s;
    }
    .nav-item .ni { font-size: 22px; }
    .nav-item .nl { font-size: 10px; font-weight: 700; color: var(--text-light); }
    .nav-item.active .nl { color: var(--primary-dark); }
    .nav-item.active .ni { filter: drop-shadow(0 2px 4px rgba(124,158,255,0.4)); transform: scale(1.1); }

    /* padding for nav */
    .has-nav { padding-bottom: 100px; }

    /* ===== CONFETTI ===== */
    .confetti-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45,53,97,0.5);
      z-index: 400;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }
    .modal h3 { font-family: 'Baloo 2', cursive; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .modal p { color: var(--text-light); font-size: 14px; font-weight: 600; margin-bottom: 20px; }
    .modal-btns { display: flex; flex-direction: column; gap: 10px; }

    /* Responsive */
    @media (max-width: 360px) {
      .steps-grid { grid-template-columns: repeat(4, 1fr); }
      .question-text { font-size: 34px; }
      .option-btn { font-size: 24px; padding: 14px 8px; }
    }

    @media (min-width: 600px) {
      #home, #steps, #quiz, #result, #stats {
        max-width: 540px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="home" class="screen active has-nav">
  <div class="logo-area">
    <span class="logo-emoji">🧮</span>
    <div class="logo-title">MathStar</div>
    <div class="logo-sub">Matematika — Qiziqarli va Oson!</div>
  </div>

  <div class

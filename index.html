<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧮 MathStar — Matematika O'yini</title>
  <style>
    /* SIZNING ASOSIY DIZAYNINGIZ */
    body { font-family: 'Nunito', sans-serif; background: #F0F2F5; margin: 0; display: flex; justify-content: center; height: 100vh; }
    .screen { display: none; width: 100%; max-width: 500px; background: #fff; flex-direction: column; }
    .active { display: flex; }
    #login { align-items: center; justify-content: center; text-align: center; background: #7C9EFF; }
    .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 85%; }
    .login-input { width: 90%; padding: 15px; border-radius: 12px; border: 2px solid #EEF0F8; margin: 15px 0; font-size: 18px; outline: none; }
    .btn { padding: 15px 30px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
    .btn-primary { background: #FFD166; color: #333; width: 100%; }
    .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #f8f9fa; margin: 10px; border-radius: 15px; }
    .level-card { background: #fff; border: 2px solid var(--lvl-color); padding: 15px; margin: 10px; border-radius: 15px; cursor: pointer; }
  </style>
</head>
<body>

<div id="login" class="screen active">
  <div class="login-box">
    <span style="font-size: 60px;">👋</span>
    <h2>Salom! Isming nima?</h2>
    <input type="text" id="user-name-input" class="login-input" placeholder="Ismingizni yozing...">
    <button class="btn btn-primary" onclick="loginUser()">O'yinga kirish</button>
  </div>
</div>

<div id="home" class="screen">
  <div style="padding:20px;">
    <h2 id="welcome-user">MathStar</h2>
    <div class="stats-bar">
      <div id="home-total-steps">0</div><div>Bosqich</div>
      <div id="home-stars">0⭐</div><div>Yulduz</div>
    </div>
    <div id="levels-grid"></div>
  </div>
</div>

<script>
let currentUser = "";
let appData = { progress: [[],[],[],[],[]], totalStars: 0, currentStreak: 0 };

const LEVELS = [
  { id: 1, icon: '🌱', name: "Boshlang'ich", color: '#6ECFA0', desc: '10 ichida qo\'shish' },
  { id: 2, icon: '🌿', name: "O'rta", color: '#7C9EFF', desc: '100 ichida qo\'shish' },
  { id: 3, icon: '⭐', name: "Karra jadval", color: '#FFD166', desc: '2–9 sonlar' },
  { id: 4, icon: '🚀', name: "Aralash 100", color: '#C4A8FF', desc: '4 amal' },
  { id: 5, icon: '🏆', name: "Ilg\'or 1000", color: '#FF9F43', desc: '1000 ichida' }
];

function loginUser() {
  const name = document.getElementById('user-name-input').value.trim();
  if (name.length < 2) return;
  currentUser = name;
  document.getElementById('welcome-user').textContent = name;
  renderHome();
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHome() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    card.style.setProperty('--lvl-color', lvl.color);
    card.innerHTML = `<strong>${lvl.icon} ${lvl.name}</strong><p>${lvl.desc}</p>`;
    card.onclick = () => alert(lvl.name + " boshlanmoqda...");
    grid.appendChild(card);
  });
}
</script>
</body>
</html>

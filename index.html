<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧮 MathStar — Matematika O'yini</title>
  <style>
    /* Barcha original CSS bu yerda bo'lishi kerak... */
    /* Quyida faqat Login uchun yangi qo'shilgan kichik uslublar: */
    #login-screen { align-items: center; justify-content: center; text-align: center; }
    .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
    .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #EEF0F8; margin: 15px 0; font-size: 18px; font-family: 'Nunito'; outline: none; }
    /* Original CSS-ni saqlab qolish uchun yuqoridagi barcha stilni shu yerga qo'ying */
  </style>
  <link rel="stylesheet" href="style.css"> </head>
<body>

<div id="login" class="screen active">
  <div class="login-box">
    <span style="font-size: 60px;">👋</span>
    <h2 style="font-family: 'Baloo 2'; margin: 10px 0;">Salom! Isming nima?</h2>
    <input type="text" id="user-name-input" class="login-input" placeholder="Ismingizni yozing..." autocomplete="off">
    <button class="btn btn-primary" onclick="loginUser()">O'yinga kirish</button>
  </div>
</div>

<div id="home" class="screen has-nav">
  <div class="logo-area">
    <span class="logo-emoji">🧮</span>
    <div class="logo-title" id="welcome-user">MathStar</div>
    <div class="logo-sub">Matematika — Qiziqarli va Oson!</div>
  </div>

  <div class="stats-bar">
    <div class="stat-chip"><div class="val" id="home-total-steps">0</div><div class="lbl">Bosqich</div></div>
    <div class="stat-chip"><div class="val" id="home-streak">0🔥</div><div class="lbl">Streak</div></div>
    <div class="stat-chip"><div class="val" id="home-stars">0⭐</div><div class="lbl">Yulduz</div></div>
  </div>

  <div class="levels-title">📚 Darajalar</div>
  <div class="levels-grid" id="levels-grid"></div>
</div>

<script>
// ============================================================
//  DATA & CONFIG (O'zgartirilgan mantiq)
// ============================================================
let currentUser = ""; // Profil tizimi uchun

const LEVELS = [
  { id: 1, icon: '🌱', name: "Boshlang'ich", color: '#6ECFA0', desc: '10 ichida qo\'shish va ayirish', steps: 100, gen: (s) => genLevel1(s) },
  { id: 2, icon: '🌿', name: "O'rta", color: '#7C9EFF', desc: '100 ichida qo\'shish va ayirish', steps: 100, gen: (s) => genLevel2(s) },
  { id: 3, icon: '⭐', name: "Karra jadval", color: '#FFD166', desc: '2–9 sonlar ko\'paytmasi', steps: 100, gen: (s) => genLevel3(s) },
  { id: 4, icon: '🚀', name: "Aralash 100", color: '#C4A8FF', desc: '100 ichida 4 amal', steps: 100, gen: (s) => genLevel4(s) },
  { id: 5, icon: '🏆', name: "Ilg\'or 1000", color: '#FF9F43', desc: '1000 ichida 4 amal', steps: 100, gen: (s) => genLevel5(s) }
];

const PASS_SCORE = 18; // 18/20 o'tish chegarasi
const Q_PER_STEP = 20;

// ============================================================
//  USER & STORAGE LOGIC
// ============================================================
function loginUser() {
  const name = document.getElementById('user-name-input').value.trim();
  if (name.length < 2) {
    showToast("Iltimos, ismingizni kiriting");
    return;
  }
  currentUser = name;
  appData = loadUserData(name);
  document.getElementById('welcome-user').textContent = name;
  goHome();
}

function loadUserData(userName) {
  const key = `mathstar_user_${userName}`;
  const data = localStorage.getItem(key);
  return data ? JSON.parse(data) : getDefaultData();
}

function saveData() {
  if (!currentUser) return;
  const key = `mathstar_user_${currentUser}`;
  try { localStorage.setItem(key, JSON.stringify(appData)); } catch(e) {}
}

function getDefaultData() {
  return {
    progress: [new Array(100).fill(false), new Array(100).fill(false), new Array(100).fill(false), new Array(100).fill(false), new Array(100).fill(false)],
    stars: [new Array(100).fill(0), new Array(100).fill(0), new Array(100).fill(0), new Array(100).fill(0), new Array(100).fill(0)],
    totalQuestions: 0, totalCorrect: 0, currentStreak: 0, maxStreak: 0, totalStars: 0, medals: [false, false, false, false, false],
  };
}

// ============================================================
//  RENDER HOME (Level Lock-lar olib tashlandi)
// ============================================================
function renderHome() {
  const totalSteps = appData.progress.reduce((sum, lvl) => sum + lvl.filter(Boolean).length, 0);
  document.getElementById('home-total-steps').textContent = totalSteps;
  document.getElementById('home-streak').textContent = appData.currentStreak + '🔥';
  document.getElementById('home-stars').textContent = appData.totalStars + '⭐';

  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';

  LEVELS.forEach((lvl, i) => {
    const done = appData.progress[i].filter(Boolean).length;
    // DARAXATLAR ENDI QULFLANMAGAN - HAMMASI OCHIQ
    const card = document.createElement('div');
    card.className = 'level-card';
    card.style.setProperty('--lvl-color', lvl.color);
    card.onclick = () => openLevel(i);

    card.innerHTML = `
      <div class="level-icon">${lvl.icon}</div>
      <div class="level-info">
        <div class="level-name">${lvl.name}</div>
        <div class="level-desc">${lvl.desc}</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${done}%"></div>
        </div>
      </div>
      <div class="level-progress">
        <div class="steps" style="color:${lvl.color}">${done}</div>
        <div class="stlbl">/ 100</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ============================================================
//  SAVOLLAR GENERATSIYASI VA BOSHQALAR
// ============================================================
// [Siz tashlagan rnd, genLevel1...genLevel5, renderQuestion, selectAnswer funksiyalari o'z holicha qoladi]
// Faqat finishStep funksiyasidagi logic PASS_SCORE = 18 ga qarab ishlaydi.

function finishStep() {
  clearInterval(timerInterval);
  const passed = correctCount >= PASS_SCORE;

  let stars = 0;
  if (correctCount >= 20) stars = 3;
  else if (correctCount >= 19) stars = 2;
  else if (correctCount >= 18) stars = 1;

  if (passed) {
    if (!appData.progress[currentLevel][currentStep]) {
      appData.progress[currentLevel][currentStep] = true;
      appData.totalStars += stars;
      appData.stars[currentLevel][currentStep] = stars;
    } else if (stars > appData.stars[currentLevel][currentStep]) {
      appData.totalStars += (stars - appData.stars[currentLevel][currentStep]);
      appData.stars[currentLevel][currentStep] = stars;
    }
  }
  saveData();
  
  // Natija ekranini ko'rsatish (Sizdagi original renderResult logic)
  showResult(passed); 
}

// Boshlanishida Login ekranini chiqarish
window.onload = () => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('login').classList.add('active');
};

</script>
</body>
</html>
